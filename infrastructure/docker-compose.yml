# TalentLens — Local Development Infrastructure
# Usage: docker compose up -d

services:
  # ─── PostgreSQL with pgvector ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: talentlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: talentlens
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talentlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentlens"]
      interval: 10s
      timeout: 5s
      retries: 5

